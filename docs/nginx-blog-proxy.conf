# ════════════════════════════════════════════════════════════════════
#  NGINX REVERSE PROXY — sondervn.com/tin-tuc → vp-marketing blog API
# ════════════════════════════════════════════════════════════════════
#
#  Phương án A3: vp-marketing (103.82.193.74:3000) host blog, sondervn.com
#  chỉ proxy. KHÔNG đụng OTA database, KHÔNG sửa app code sondervn.com.
#
#  Anh (hoặc người quản lý nginx sondervn.com) chỉ cần thêm 3 location
#  block dưới đây vào server block đang phục vụ sondervn.com.
#
#  AN TOÀN: Đây chỉ là routing config — KHÔNG động vào database, KHÔNG
#  sửa application code. Nếu sai, chỉ ảnh hưởng /tin-tuc (rollback = xoá
#  3 block này). Booking/OTA flow KHÔNG bị ảnh hưởng.
# ════════════════════════════════════════════════════════════════════

# ─── Bước 1: Tìm file nginx config của sondervn.com ───
#   Thường ở: /etc/nginx/sites-available/sondervn.com
#         hoặc /etc/nginx/conf.d/sondervn.conf
#   Tìm: sudo grep -rl "sondervn.com" /etc/nginx/

# ─── Bước 2: Thêm 3 location block sau vào trong `server { ... }` ───
#   (server block đang có `server_name sondervn.com;` và `listen 443 ssl;`)

# ┌─────────────────────────────────────────────────────────────────┐
# │ COPY TỪ ĐÂY                                                      │
# └─────────────────────────────────────────────────────────────────┘

# Blog listing + articles → vp-marketing render
location /tin-tuc {
    proxy_pass http://103.82.193.74:3000/blog/tin-tuc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;

    # Cache 10 phút ở nginx để giảm tải vp-marketing + tăng tốc
    proxy_cache_valid 200 10m;
    proxy_cache_bypass $http_pragma;
}

# Blog sitemap → Google Search Console submit cái này
location = /tin-tuc-sitemap.xml {
    proxy_pass http://103.82.193.74:3000/blog/sitemap.xml;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 30s;
}

# ┌─────────────────────────────────────────────────────────────────┐
# │ COPY ĐẾN ĐÂY                                                     │
# └─────────────────────────────────────────────────────────────────┘

# ─── Bước 3: Test config + reload (KHÔNG downtime) ───
#   sudo nginx -t                  # phải thấy "syntax is ok" + "test is successful"
#   sudo systemctl reload nginx    # reload, KHÔNG restart (zero downtime)

# ─── Bước 4: Verify ───
#   curl -I https://sondervn.com/tin-tuc
#   → phải thấy HTTP 200, Content-Type: text/html
#   Mở browser: https://sondervn.com/tin-tuc

# ════════════════════════════════════════════════════════════════════
#  LƯU Ý QUAN TRỌNG
# ════════════════════════════════════════════════════════════════════
#
#  1. Nếu sondervn.com đã có route /tin-tuc của riêng nó (Next.js page):
#     → location /tin-tuc { ... } này sẽ OVERRIDE nó.
#     → Nếu muốn giữ trang /tin-tuc cũ + chỉ proxy bài mới, dùng path
#       khác, vd: location /blog { proxy_pass .../blog/tin-tuc; }
#       rồi bài sẽ ở sondervn.com/blog/... thay vì /tin-tuc/...
#     → Báo Claude để điều chỉnh BLOG_BASE trong src/routes/blog.ts cho khớp.
#
#  2. Firewall: VPS vp-marketing (103.82.193.74) port 3000 phải cho phép
#     server sondervn.com connect tới. Nếu fail:
#       # Trên vp-marketing VPS:
#       sudo ufw allow from <SONDERVN_SERVER_IP> to any port 3000
#
#  3. HTTPS: nginx terminate SSL ở sondervn.com, proxy HTTP nội bộ tới
#     vp-marketing. body render dùng https://sondervn.com URL nên SEO OK.
#
#  4. Nếu vp-marketing down → /tin-tuc trả 502. Các trang khác của
#     sondervn.com (booking, khách sạn) KHÔNG bị ảnh hưởng (khác location).
#
#  5. Rollback: xoá 2 location block → nginx -t → reload. Xong.
# ════════════════════════════════════════════════════════════════════

# ─── Optional: tăng độ tin cậy với cache zone (thêm vào http{} block) ───
#   proxy_cache_path /var/cache/nginx/blog levels=1:2 keys_zone=blog_cache:10m
#                    max_size=100m inactive=60m use_temp_path=off;
#   Rồi trong location /tin-tuc thêm:  proxy_cache blog_cache;
